version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: zomato_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - zomato-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: zomato_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - zomato-network

  backend:
    build: ./backend
    container_name: zomato_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/zomato
      - RABBITMQ_URL=amqp://rabbitmq
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyzomato123}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - zomato-network

  frontend:
    build: ./frontend
    container_name: zomato_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zomato-network

networks:
  zomato-network:
    driver: bridge

volumes:
  mongodb_data:
